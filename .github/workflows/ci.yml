name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.4.10
      - name: Lint app and tests
        working-directory: Estación5/Control-Calidad
        run: ruff check app/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qc_user
          POSTGRES_PASSWORD: qc_password
          POSTGRES_DB: control_calidad_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://qc_user:qc_password@localhost:5432/control_calidad_test
      JWT_SECRET_KEY: test-secret-key-for-ci
      ENVIRONMENT: development

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: Estación7/CC-01-setup-infraestructura-backend
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run migrations
        working-directory: Estación7/CC-01-setup-infraestructura-backend
        run: alembic upgrade head
      - name: Run tests with coverage
        working-directory: Estación5/Control-Calidad
        run: pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=60

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    defaults:
      run:
        working-directory: Estación7/CC-01-setup-infraestructura-backend
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t control-calidad-api:${{ github.sha }} .
